version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # StatsPAI still supports Python 3.9. mypy 2.x no longer supports
      # `python_version = "3.9"` in its config, so keep this pinned below 2
      # until the runtime support floor is raised deliberately.
      - dependency-name: "mypy"
        versions: [">=2.0.0"]

  # GitHub Actions pins
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci

  # Rust HDFE backend
  - package-ecosystem: cargo
    directory: "/rust/statspai_hdfe"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - rust
